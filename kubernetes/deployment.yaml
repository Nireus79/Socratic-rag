# Socratic RAG Kubernetes Deployment
#
# Deploy with:
#   kubectl create namespace socratic-rag
#   kubectl apply -f kubernetes/ -n socratic-rag
#
# Scale:
#   kubectl scale deployment socratic-rag --replicas=5 -n socratic-rag
#
# View:
#   kubectl get pods -n socratic-rag
#   kubectl logs -f deployment/socratic-rag -n socratic-rag

apiVersion: v1
kind: Namespace
metadata:
  name: socratic-rag

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: socratic-rag
  namespace: socratic-rag
  labels:
    app: socratic-rag
    version: v0.1.0
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: socratic-rag
  template:
    metadata:
      labels:
        app: socratic-rag
        version: v0.1.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: socratic-rag
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
      - name: rag-api
        image: socratic-rag:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP

        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: VECTOR_STORE
          valueFrom:
            configMapKeyRef:
              name: socratic-rag-config
              key: vector_store
        - name: QDRANT_HOST
          valueFrom:
            configMapKeyRef:
              name: socratic-rag-config
              key: qdrant_host
        - name: EMBEDDING_CACHE
          valueFrom:
            configMapKeyRef:
              name: socratic-rag-config
              key: embedding_cache
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: socratic-rag-config
              key: log_level

        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: cache
          mountPath: /app/cache

      volumes:
      - name: data
        emptyDir: {}
      - name: cache
        emptyDir: {}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - socratic-rag
              topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: socratic-rag-service
  namespace: socratic-rag
  labels:
    app: socratic-rag
spec:
  type: LoadBalancer
  selector:
    app: socratic-rag
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 8000

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: socratic-rag-hpa
  namespace: socratic-rag
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: socratic-rag
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 2
        periodSeconds: 15
      selectPolicy: Max

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: socratic-rag
  namespace: socratic-rag

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: socratic-rag-config
  namespace: socratic-rag
data:
  vector_store: "qdrant"
  qdrant_host: "qdrant-service"
  embedding_cache: "true"
  log_level: "INFO"

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: socratic-rag-pdb
  namespace: socratic-rag
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: socratic-rag

---
apiVersion: v1
kind: NetworkPolicy
metadata:
  name: socratic-rag-network-policy
  namespace: socratic-rag
spec:
  podSelector:
    matchLabels:
      app: socratic-rag
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 6333  # Qdrant
    - protocol: TCP
      port: 53   # DNS
    - protocol: UDP
      port: 53   # DNS

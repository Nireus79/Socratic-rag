# Qdrant Vector Store StatefulSet for Kubernetes
#
# Deploy with:
#   kubectl apply -f kubernetes/qdrant-statefulset.yaml -n socratic-rag
#
# For single-node Qdrant, set replicas: 1
# For HA cluster, use replicas: 3 or higher

apiVersion: v1
kind: ConfigMap
metadata:
  name: qdrant-config
  namespace: socratic-rag
data:
  qdrant.yaml: |
    server:
      http_port: 6333
      grpc_port: 6334
    storage:
      snapshots_folder: /qdrant/snapshots
      storage_path: /qdrant/storage
      wal_path: /qdrant/wal
      performance:
        max_search_threads: 0
        max_optimization_threads: 0

---
apiVersion: v1
kind: Service
metadata:
  name: qdrant-service
  namespace: socratic-rag
  labels:
    app: qdrant
spec:
  clusterIP: None
  selector:
    app: qdrant
  ports:
  - name: http
    port: 6333
    targetPort: 6333
  - name: grpc
    port: 6334
    targetPort: 6334

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: socratic-rag
  labels:
    app: qdrant
spec:
  serviceName: qdrant-service
  replicas: 3  # Change to 1 for single-node, 3+ for HA cluster
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "6333"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
      - name: qdrant
        image: qdrant/qdrant:latest
        imagePullPolicy: IfNotPresent

        ports:
        - name: http
          containerPort: 6333
        - name: grpc
          containerPort: 6334

        env:
        - name: QDRANT_ALLOW_RECOVERY_MODE
          value: "true"
        - name: LOG_LEVEL
          value: "INFO"

        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2000m"

        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        volumeMounts:
        - name: qdrant-data
          mountPath: /qdrant/storage
        - name: qdrant-snapshots
          mountPath: /qdrant/snapshots
        - name: qdrant-wal
          mountPath: /qdrant/wal
        - name: qdrant-config
          mountPath: /qdrant/config
          readOnly: true

      volumes:
      - name: qdrant-config
        configMap:
          name: qdrant-config

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - qdrant
              topologyKey: kubernetes.io/hostname

  volumeClaimTemplates:
  - metadata:
      name: qdrant-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 50Gi

  - metadata:
      name: qdrant-snapshots
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi

  - metadata:
      name: qdrant-wal
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: qdrant-pdb
  namespace: socratic-rag
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: qdrant
